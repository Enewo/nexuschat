<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NexusChat — Live</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #080c14;
      --surface: #0e1420;
      --surface2: #141b2d;
      --border: rgba(99,179,237,0.12);
      --accent: #63b3ed;
      --accent2: #68d391;
      --danger: #fc8181;
      --text: #e2e8f0;
      --muted: #4a5568;
      --glow: rgba(99,179,237,0.15);
    }

    html, body { height: 100%; }

    body {
      font-family: 'Syne', sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* Animated grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(99,179,237,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(99,179,237,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    /* JOIN SCREEN */
    #join-screen {
      position: fixed;
      inset: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg);
    }

    .join-card {
      width: 100%;
      max-width: 420px;
      padding: 3rem 2.5rem;
      background: var(--surface);
      border: 1px solid var(--border);
      position: relative;
      animation: fadeUp 0.6s ease forwards;
    }

    .join-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .join-logo {
      font-size: 1.8rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 0.4rem;
    }

    .join-logo span { color: var(--accent); }

    .join-sub {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 2.5rem;
      font-family: 'Space Mono', monospace;
    }

    .join-label {
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    .join-input {
      width: 100%;
      padding: 0.9rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Space Mono', monospace;
      font-size: 1rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      margin-bottom: 1.5rem;
    }

    .join-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--glow);
    }

    .join-btn {
      width: 100%;
      padding: 0.95rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.2s;
    }

    .join-btn:hover { opacity: 0.85; transform: translateY(-1px); }

    /* MAIN APP */
    #app {
      display: none;
      width: 100vw;
      height: 100vh;
      position: relative;
      z-index: 1;
    }

    .app-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      grid-template-rows: 60px 1fr 80px;
      height: 100vh;
      max-width: 1200px;
      margin: 0 auto;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
    }

    /* HEADER */
    .app-header {
      grid-column: 1 / -1;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 1.5rem;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-logo {
      font-size: 1.1rem;
      font-weight: 800;
      letter-spacing: -0.01em;
    }

    .header-logo span { color: var(--accent); }

    .header-status {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.75rem;
      color: var(--accent2);
    }

    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--accent2);
      border-radius: 50%;
      animation: pulse 2s infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* SIDEBAR */
    .sidebar {
      border-right: 1px solid var(--border);
      background: var(--surface);
      overflow-y: auto;
      padding: 1.5rem 1rem;
      grid-row: 2 / 4;
    }

    .sidebar-title {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      padding: 0 0.5rem;
    }

    .user-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.6rem 0.5rem;
      border-radius: 2px;
      margin-bottom: 0.25rem;
      transition: background 0.15s;
    }

    .user-item:hover { background: var(--surface2); }

    .user-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.7rem;
      font-weight: 700;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 0.88rem;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .you-badge {
      margin-left: auto;
      font-size: 0.6rem;
      color: var(--muted);
      font-family: 'Space Mono', monospace;
      background: var(--surface2);
      padding: 0.1rem 0.4rem;
    }

    /* MESSAGES */
    #messages {
      overflow-y: auto;
      padding: 1.5rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
      background: var(--bg);
      scroll-behavior: smooth;
    }

    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: var(--border); }

    .msg {
      display: flex;
      gap: 0.75rem;
      animation: msgIn 0.3s ease forwards;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateX(-10px); }
      to { opacity: 1; transform: translateX(0); }
    }

    .msg-avatar {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .msg-body { flex: 1; }

    .msg-meta {
      display: flex;
      align-items: baseline;
      gap: 0.75rem;
      margin-bottom: 0.3rem;
    }

    .msg-username {
      font-size: 0.88rem;
      font-weight: 700;
    }

    .msg-time {
      font-family: 'Space Mono', monospace;
      font-size: 0.65rem;
      color: var(--muted);
    }

    .msg-text {
      font-size: 0.95rem;
      line-height: 1.6;
      color: rgba(226,232,240,0.85);
      word-break: break-word;
    }

    .msg-own .msg-body { text-align: right; }
    .msg-own { flex-direction: row-reverse; }
    .msg-own .msg-meta { flex-direction: row-reverse; }
    .msg-own .msg-text {
      background: var(--surface2);
      display: inline-block;
      padding: 0.5rem 0.9rem;
      text-align: left;
    }

    .sys-msg {
      text-align: center;
      font-family: 'Space Mono', monospace;
      font-size: 0.7rem;
      color: var(--muted);
      padding: 0.5rem;
    }

    .sys-msg span {
      background: var(--surface);
      padding: 0.25rem 0.75rem;
      border: 1px solid var(--border);
    }

    /* TYPING */
    #typing-indicator {
      height: 20px;
      padding: 0 1.5rem;
      font-family: 'Space Mono', monospace;
      font-size: 0.72rem;
      color: var(--muted);
    }

    /* INPUT */
    .input-bar {
      grid-column: 2;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 1.5rem;
      border-top: 1px solid var(--border);
      background: var(--surface);
      gap: 0.4rem;
    }

    .input-row {
      display: flex;
      gap: 0.75rem;
      align-items: center;
    }

    #msg-input {
      flex: 1;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    #msg-input:focus { border-color: var(--accent); }

    #send-btn {
      padding: 0.75rem 1.5rem;
      background: var(--accent);
      color: var(--bg);
      border: none;
      font-family: 'Syne', sans-serif;
      font-weight: 700;
      font-size: 0.85rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      cursor: pointer;
      transition: opacity 0.2s;
      white-space: nowrap;
    }

    #send-btn:hover { opacity: 0.85; }

    /* RESPONSIVE */
    @media (max-width: 640px) {
      .app-layout {
        grid-template-columns: 1fr;
        grid-template-rows: 60px 1fr 80px;
      }
      .sidebar { display: none; }
      .input-bar { grid-column: 1; }
    }
  </style>
</head>
<body>

<!-- JOIN SCREEN -->
<div id="join-screen">
  <div class="join-card">
    <div class="join-logo">Nexus<span>Chat</span></div>
    <div class="join-sub">// real-time cloud messaging</div>
    <div class="join-label">Enter your username</div>
    <input class="join-input" id="username-input" type="text" placeholder="e.g. cloud_dev_42" maxlength="20" autocomplete="off"/>
    <button class="join-btn" id="join-btn">Connect to Server →</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="app-layout">

    <header class="app-header">
      <div class="header-logo">Nexus<span>Chat</span></div>
      <div class="header-status">
        <div class="status-dot"></div>
        <span id="server-status">connected</span>
      </div>
    </header>

    <aside class="sidebar">
      <div class="sidebar-title">Online — <span id="user-count">0</span></div>
      <div id="user-list"></div>
    </aside>

    <div id="messages"></div>

    <div class="input-bar">
      <div id="typing-indicator"></div>
      <div class="input-row">
        <input id="msg-input" type="text" placeholder="Send a message..." maxlength="500" autocomplete="off"/>
        <button id="send-btn">Send</button>
      </div>
    </div>

  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  let myUsername = '';
  let myColor = '';
  let typingTimer = null;
  let isTyping = false;
  const typingUsers = new Set();

  // JOIN
  const joinScreen = document.getElementById('join-screen');
  const appEl = document.getElementById('app');
  const usernameInput = document.getElementById('username-input');
  const joinBtn = document.getElementById('join-btn');

  function joinChat() {
    const name = usernameInput.value.trim();
    if (!name) return usernameInput.focus();
    myUsername = name;
    socket.emit('user:join', name);
    joinScreen.style.display = 'none';
    appEl.style.display = 'block';
    document.getElementById('msg-input').focus();
  }

  joinBtn.addEventListener('click', joinChat);
  usernameInput.addEventListener('keydown', e => { if (e.key === 'Enter') joinChat(); });

  // MESSAGES
  const messagesEl = document.getElementById('messages');

  function scrollToBottom() {
    messagesEl.scrollTop = messagesEl.scrollHeight;
  }

  function formatTime(ts) {
    return new Date(ts).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  }

  function initials(name) {
    return name.slice(0, 2).toUpperCase();
  }

  function renderMessage(msg) {
    const isOwn = msg.username === myUsername;
    const div = document.createElement('div');
    div.className = `msg${isOwn ? ' msg-own' : ''}`;
    div.innerHTML = `
      <div class="msg-avatar" style="background:${msg.color}22; color:${msg.color}; border: 1px solid ${msg.color}44">
        ${initials(msg.username)}
      </div>
      <div class="msg-body">
        <div class="msg-meta">
          <span class="msg-username" style="color:${msg.color}">${msg.username}</span>
          <span class="msg-time">${formatTime(msg.timestamp)}</span>
        </div>
        <div class="msg-text">${escapeHTML(msg.text)}</div>
      </div>
    `;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function renderSystem(data) {
    const div = document.createElement('div');
    div.className = 'sys-msg';
    div.innerHTML = `<span>${escapeHTML(data.text)}</span>`;
    messagesEl.appendChild(div);
    scrollToBottom();
  }

  function escapeHTML(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  socket.on('message:history', (msgs) => {
    msgs.forEach(renderMessage);
  });

  socket.on('message:new', renderMessage);
  socket.on('message:system', renderSystem);

  // USERS
  socket.on('users:update', (users) => {
    document.getElementById('user-count').textContent = users.length;
    const list = document.getElementById('user-list');
    list.innerHTML = '';
    users.forEach(u => {
      const div = document.createElement('div');
      div.className = 'user-item';
      div.innerHTML = `
        <div class="user-avatar" style="background:${u.color}22; color:${u.color}; border:1px solid ${u.color}44">
          ${initials(u.username)}
        </div>
        <span class="user-name">${escapeHTML(u.username)}</span>
        ${u.username === myUsername ? '<span class="you-badge">you</span>' : ''}
      `;
      list.appendChild(div);
      if (u.username === myUsername) myColor = u.color;
    });
  });

  // SEND
  const msgInput = document.getElementById('msg-input');
  const sendBtn = document.getElementById('send-btn');

  function sendMessage() {
    const text = msgInput.value.trim();
    if (!text) return;
    socket.emit('message:send', text);
    msgInput.value = '';
    stopTyping();
  }

  sendBtn.addEventListener('click', sendMessage);
  msgInput.addEventListener('keydown', e => { if (e.key === 'Enter') sendMessage(); });

  // TYPING
  msgInput.addEventListener('input', () => {
    if (!isTyping) {
      isTyping = true;
      socket.emit('typing:start');
    }
    clearTimeout(typingTimer);
    typingTimer = setTimeout(stopTyping, 1500);
  });

  function stopTyping() {
    if (isTyping) {
      isTyping = false;
      socket.emit('typing:stop');
    }
  }

  const typingEl = document.getElementById('typing-indicator');

  socket.on('typing:update', ({ username, typing }) => {
    if (typing) typingUsers.add(username);
    else typingUsers.delete(username);

    if (typingUsers.size === 0) {
      typingEl.textContent = '';
    } else {
      const names = [...typingUsers].join(', ');
      typingEl.textContent = `${names} ${typingUsers.size === 1 ? 'is' : 'are'} typing...`;
    }
  });

  // CONNECTION STATUS
  socket.on('disconnect', () => {
    document.getElementById('server-status').textContent = 'disconnected';
  });
  socket.on('connect', () => {
    document.getElementById('server-status').textContent = 'connected';
  });
</script>
</body>
</html>
